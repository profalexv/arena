<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXOM · Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3e;
      --accent:  #5b8ff9;
      --green:   #3ecf8e;
      --red:     #f87171;
      --yellow:  #fbbf24;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --font:    'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* ── Login overlay ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #login-screen.hidden { display: none; }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 360px;
      text-align: center;
    }
    .login-box h1 { font-size: 1.4rem; margin-bottom: .5rem; }
    .login-box p  { color: var(--muted); font-size: .875rem; margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%; padding: .65rem 1rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .95rem;
      outline: none; margin-bottom: 1rem;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%; padding: .7rem;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: .95rem; font-weight: 600; cursor: pointer;
    }
    .login-box button:hover { opacity: .85; }
    #login-error { color: var(--red); font-size: .8rem; margin-top: .75rem; min-height: 1em; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
    header h1 span { color: var(--accent); }

    .status-bar {
      display: flex; align-items: center; gap: 1rem;
      font-size: .8rem; color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 4px;
    }
    .dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red    { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .dot.yellow { background: var(--yellow); }

    /* ── Grid layout ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 700px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
    .card-title {
      font-size: .7rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: .75rem;
    }
    .card-value {
      font-size: 2.2rem; font-weight: 700; line-height: 1;
    }
    .card-sub {
      font-size: .8rem; color: var(--muted); margin-top: .35rem;
    }

    /* ── Server health cards ── */
    .server-card {
      display: flex; align-items: center; justify-content: space-between;
    }
    .server-info h3 { font-size: 1rem; font-weight: 600; }
    .server-info p  { font-size: .8rem; color: var(--muted); margin-top: .2rem; }
    .badge {
      font-size: .75rem; font-weight: 700; padding: .3rem .75rem;
      border-radius: 20px;
    }
    .badge.online  { background: rgba(62,207,142,.15); color: var(--green); }
    .badge.offline { background: rgba(248,113,113,.15); color: var(--red); }

    /* ── Sessions table ── */
    .section-title {
      font-size: .7rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      margin: 1.25rem 0 .75rem;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .service-name {
      font-size: .85rem; font-weight: 700; margin-bottom: .75rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .service-name .dot { flex-shrink: 0; }
    .metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: .5rem; text-align: center;
    }
    .metric-val  { font-size: 1.35rem; font-weight: 700; }
    .metric-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

    /* ── Plans breakdown ── */
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .75rem;
    }
    .plan-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      text-align: center;
    }
    .plan-name  { font-size: .7rem; color: var(--muted); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .plan-count { font-size: 1.6rem; font-weight: 700; margin-top: .25rem; }

    /* ── Timestamp ── */
    #ts { font-size: .75rem; color: var(--muted); }

    /* ── Pulse animation for live dot ── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .live-dot { animation: pulse 2s infinite; }
  </style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <h1>AXOM <span style="color:var(--accent)">Panel</span></h1>
    <p>Monitor interno · uso restrito</p>
    <input type="password" id="secret-input" placeholder="Senha de acesso" autocomplete="current-password">
    <button id="login-btn">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────── -->
<div id="app" style="display:none">

  <header>
    <h1>AXOM <span>Panel</span></h1>
    <div class="status-bar">
      <span><span class="dot green live-dot"></span>ao vivo</span>
      <span id="ts">—</span>
      <button id="logout-btn" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:.3rem .7rem;cursor:pointer;font-size:.75rem">Sair</button>
    </div>
  </header>

  <!-- Servidores -->
  <p class="section-title">Servidores</p>
  <div class="grid-2">
    <div class="card server-card">
      <div class="server-info">
        <h3>Motor</h3>
        <p id="motor-uptime">—</p>
      </div>
      <span id="motor-badge" class="badge">—</span>
    </div>
    <div class="card server-card">
      <div class="server-info">
        <h3>Render</h3>
        <p id="render-uptime">—</p>
      </div>
      <span class="badge online">online</span>
    </div>
  </div>

  <!-- Clientes -->
  <p class="section-title">Clientes (class.axom.app)</p>
  <div class="grid-3">
    <div class="card">
      <div class="card-title">Cadastros</div>
      <div class="card-value" id="total-schools">—</div>
      <div class="card-sub">escolas registradas</div>
    </div>
    <div class="card">
      <div class="card-title">Mensalidades em dia</div>
      <div class="card-value" id="active-subs">—</div>
      <div class="card-sub">assinaturas ativas</div>
    </div>
    <div class="card">
      <div class="card-title">Inadimplentes</div>
      <div class="card-value" id="inactive-subs" style="color:var(--red)">—</div>
      <div class="card-sub" id="inactive-pct"></div>
    </div>
  </div>

  <!-- Planos -->
  <p class="section-title">Distribuição por plano</p>
  <div class="plans-grid" id="plans-grid">
    <div class="plan-item"><div class="plan-name">carregando…</div></div>
  </div>

  <!-- Sessões Socket.IO -->
  <p class="section-title">Sessões (Socket.IO)</p>
  <div class="services-grid" id="services-grid">
    <!-- preenchido via JS -->
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── Nomes amigáveis ────────────────────────────────────────
  const SERVICE_LABELS = {
    arena:    { label: 'Arena',    color: '#a78bfa' },
    mindpool: { label: 'Mindpool', color: '#34d399' },
    proof:    { label: 'Proof',    color: '#60a5fa' },
    cronos:   { label: 'Cronos',   color: '#fbbf24' },
    panel:    { label: 'Panel',    color: '#94a3b8' },
  };

  // ── Auth ───────────────────────────────────────────────────
  let secret = sessionStorage.getItem('panel_secret') || '';
  let socket = null;

  function fmtUptime(s) {
    if (s == null) return '—';
    s = Math.floor(s);
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m ${s % 60}s`;
  }

  // ── Render stats ───────────────────────────────────────────
  function renderStats(data) {
    document.getElementById('ts').textContent = new Date(data.timestamp).toLocaleTimeString('pt-BR');

    // Motor health
    const motorBadge  = document.getElementById('motor-badge');
    const motorUptime = document.getElementById('motor-uptime');
    if (data.motor?.online) {
      motorBadge.className = 'badge online';
      motorBadge.textContent = 'online';
      motorUptime.textContent = `uptime: ${fmtUptime(data.motor.health?.uptime)}`;
    } else {
      motorBadge.className = 'badge offline';
      motorBadge.textContent = 'offline';
      motorUptime.textContent = data.motor?.error || '';
    }

    // Render health
    const renderUptime = document.getElementById('render-uptime');
    if (renderUptime) renderUptime.textContent = `uptime: ${fmtUptime(data.render?.uptime)}`;

    // Clientes
    const total  = data.clients?.totalSchools  ?? '—';
    const active = data.clients?.activeSubscriptions ?? '—';
    document.getElementById('total-schools').textContent = total;
    document.getElementById('active-subs').textContent   = active;
    if (typeof total === 'number' && typeof active === 'number') {
      const inactive = total - active;
      document.getElementById('inactive-subs').textContent = inactive;
      const pct = total > 0 ? ((inactive / total) * 100).toFixed(0) : 0;
      document.getElementById('inactive-pct').textContent = `${pct}% do total`;
    }

    // Planos
    const plans  = data.clients?.planBreakdown ?? {};
    const grid   = document.getElementById('plans-grid');
    const entries = Object.entries(plans);
    if (entries.length === 0) {
      grid.innerHTML = '<div class="plan-item"><div class="plan-name">sem dados</div></div>';
    } else {
      grid.innerHTML = entries
        .sort((a, b) => b[1] - a[1])
        .map(([id, count]) => `
          <div class="plan-item">
            <div class="plan-name">${id.replace('_', ' ')}</div>
            <div class="plan-count">${count}</div>
          </div>`).join('');
    }

    // Sessões Socket.IO
    const sessions = data.sessions ?? {};
    const svcGrid  = document.getElementById('services-grid');
    const svcEntries = Object.entries(sessions).filter(([k]) => k !== 'panel');
    if (svcEntries.length === 0) {
      svcGrid.innerHTML = '<div class="service-card" style="color:var(--muted);font-size:.85rem">Nenhuma sessão rastreada ainda (aguardando conexões ao Socket.IO).</div>';
    } else {
      svcGrid.innerHTML = svcEntries.map(([name, s]) => {
        const cfg   = SERVICE_LABELS[name] || { label: name, color: 'var(--accent)' };
        const dot   = s.active > 0 ? 'green' : 'yellow';
        return `
          <div class="service-card">
            <div class="service-name">
              <span class="dot ${dot}"></span>
              <span style="color:${cfg.color}">${cfg.label}</span>
            </div>
            <div class="metrics">
              <div>
                <div class="metric-val">${s.active}</div>
                <div class="metric-label">Agora</div>
              </div>
              <div>
                <div class="metric-val">${s.today}</div>
                <div class="metric-label">Hoje</div>
              </div>
              <div>
                <div class="metric-val">${s.week}</div>
                <div class="metric-label">Semana</div>
              </div>
            </div>
          </div>`;
      }).join('');
    }
  }

  // ── Conexão Socket.IO ──────────────────────────────────────
  function connectSocket(s) {
    if (socket) socket.disconnect();
    socket = io('/panel', { query: { secret: s }, transports: ['websocket'] });

    socket.on('stats', renderStats);

    socket.on('connect_error', (err) => {
      console.warn('Panel socket error:', err.message);
    });
  }

  // ── Login ──────────────────────────────────────────────────
  function tryLogin(s) {
    // Valida contra REST antes de mostrar UI
    fetch('/panel/stats', { headers: { 'x-panel-secret': s } })
      .then(r => {
        if (!r.ok) throw new Error('Senha incorreta');
        return r.json();
      })
      .then(data => {
        secret = s;
        sessionStorage.setItem('panel_secret', s);
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').style.display = '';
        document.getElementById('login-error').textContent = '';
        renderStats(data);
        connectSocket(s);
      })
      .catch(err => {
        document.getElementById('login-error').textContent = err.message;
      });
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    tryLogin(document.getElementById('secret-input').value.trim());
  });
  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin(document.getElementById('secret-input').value.trim());
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('panel_secret');
    if (socket) socket.disconnect();
    socket = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('secret-input').value = '';
  });

  // ── Auto-login se já tem secret salvo ─────────────────────
  if (secret) tryLogin(secret);
</script>
</body>
</html>
