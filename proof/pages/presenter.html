<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <title>Proof — Projeção</title>
    <link rel="stylesheet" href="../styles/proof.css">
    <link rel="stylesheet" href="../styles/presenter.css">
</head>
<body class="presenter-page">
    <div class="content">
        <div id="progress-screen" class="screen active">
            <h1 id="presenter-view-title">Notas da Turma</h1>
            <div id="progress-content-container"></div>
        </div>
    </div>

    <!-- Info QR + código -->
    <div id="session-info-container" class="state-waiting">
        <div class="qr-code-area">
            <div id="qrcode"></div>
            <p id="audience-url-display"></p>
        </div>
        <div class="text-info">
            <p>Código da avaliação:</p>
            <h1 id="session-code-display">------</h1>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        (function() {
            const isDevelopment = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const backendHost = isDevelopment ? 'http://localhost:3000' : '';
            document.write(`<script src="${backendHost}/shared/scripts/cronometro.js"><\/script>`);
        })();
    </script>
    <script src="../scripts/presenter.js"></script>
    <div class="project-identifier">PROOF</div>
</body>
</html>
